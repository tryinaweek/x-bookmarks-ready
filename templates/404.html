<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - XBookmarkSync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fafafa;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      background: #ffffff;
      border-bottom: 1px solid #e2e8f0;
      padding: 16px 40px;
      display: flex;
      align-items: center;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: #0f172a;
      font-weight: 800;
      font-size: 20px;
      letter-spacing: -0.5px;
    }
    .nav-brand svg { width: 28px; height: 28px; }
    .error-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }
    .error-code {
      font-size: 120px;
      font-weight: 800;
      letter-spacing: -4px;
      background: linear-gradient(135deg, #7c3aed, #1D9BF0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    .error-title {
      font-size: 24px;
      font-weight: 700;
      margin: 16px 0 8px;
    }
    .error-message {
      font-size: 16px;
      color: #64748b;
      max-width: 400px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #7c3aed;
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: background 0.2s;
    }
    .back-btn:hover { background: #6d28d9; }
    footer {
      text-align: center;
      padding: 24px;
      font-size: 13px;
      color: #94a3b8;
      border-top: 1px solid #f1f5f9;
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 4l8 8M20 4l-8 8M12 12v8"/>
      </svg>
      XBookmarkSync
    </a>
  </nav>
  <div class="error-container">
    <div class="error-code">404</div>
    <h1 class="error-title">Page not found</h1>
    <p class="error-message">The page you're looking for doesn't exist or has been moved. Head back to the homepage to get started.</p>
    <a href="/" class="back-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back to Home
    </a>
  </div>
  <footer>XBookmarkSync &copy; 2026 &middot; AI-powered bookmark intelligence</footer>
</body>
</html>
