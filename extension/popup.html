<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 16px;
      width: 260px;
      background: #ffffff;
      color: #111827;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      border-bottom: 1px solid #f3f4f6;
      padding-bottom: 8px;
    }
    .icon {
      font-size: 24px;
    }
    .title {
      font-size: 14px;
      font-weight: 700;
      margin: 0;
    }
    .subtitle {
      font-size: 11px;
      color: #6b7280;
      margin: 0;
    }
    .status-card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 12px;
      font-size: 12px;
    }
    .status-line {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .status-label {
      color: #4b5563;
    }
    .status-value {
      font-weight: 600;
    }
    .status-badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .badge-linked {
      background: #d1fae5;
      color: #065f46;
    }
    .badge-unlinked {
      background: #fee2e2;
      color: #991b1b;
    }
    .instructions {
      font-size: 11px;
      color: #4b5563;
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .btn {
      display: block;
      width: 100%;
      text-align: center;
      background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
      color: #ffffff;
      border: none;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      box-sizing: border-box;
      transition: opacity 0.2s ease;
    }
    .btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="icon">🔌</span>
    <div>
      <h3 class="title">X-Bookmarks</h3>
      <p class="subtitle">AI Sync & Archive</p>
    </div>
  </div>

  <div class="status-card">
    <div class="status-line">
      <span class="status-label">Connection:</span>
      <span id="connectionBadge" class="status-badge badge-unlinked">Unlinked</span>
    </div>
    <div class="status-line">
      <span class="status-label">App Link:</span>
      <span id="backendUrl" class="status-value">-</span>
    </div>
  </div>

  <div id="instructionsText" class="instructions">
    Please log in to your MyBookmarks dashboard to link this extension automatically.
  </div>

  <a href="http://127.0.0.1:5001" target="_blank" id="actionBtn" class="btn">Open App Dashboard</a>

  <script src="popup.js"></script>
</body>
</html>
